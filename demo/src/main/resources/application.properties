spring.application.name=demo

# Configurazione Database PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres-db:5432/demodb
#spring.datasource.url=jdbc:postgresql://localhost:8432/demodb
spring.datasource.username=myuser
spring.datasource.password=mypassword
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurazione JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Mostra le query SQL nei log (comodo in fase di sviluppo)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
