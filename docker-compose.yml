version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres_demo_container
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: demodb
    ports:
      - "8432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: